name: "Floci Cross-Backend Waterfall E2E"

# Full end-to-end cross-backend waterfall test (tests/integration/test_cross_backend_waterfall_e2e.py): a
# client bursts work at a real scheduler running the waterfall policy, driving the SHIPPED ECS worker
# manager (priority 1) and the SHIPPED ORB/EC2 worker manager (priority 2) at once. Work fills the fast ECS
# pool first and spills onto real Amazon Linux 2023 EC2 instances once ECS saturates, all via a local floci
# AWS emulator. Each EC2 instance installs a manylinux wheel of the CURRENT source (built here with
# cibuildwheel), so this is the heaviest job -- it builds that wheel and both task images and needs a Docker
# daemon, so it is NOT part of the normal build-and-test run; trigger it on demand:
#   * manually via the Actions tab ("Run workflow"); or
#   * by adding the "cross-backend-e2e" label to a pull request.
on:
  workflow_dispatch:
  pull_request:
    types: [ labeled ]

permissions:
  contents: read

jobs:
  cross-backend-e2e:
    name: Floci Cross-Backend Waterfall E2E (Linux)
    # Manual dispatch always runs; on a PR only when it carries the "cross-backend-e2e" label.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.label.name == 'cross-backend-e2e' }}
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: 'Checkout Repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-env
        with:
          os: ${{ runner.os }}
          python-version: '3.13'

      - uses: ./.github/actions/build-native-dependencies
        with:
          os: ${{ runner.os }}

      # Install scaler on the host so both manager processes (the shipped ECS + ORB/EC2 managers) run.
      - uses: ./.github/actions/build-and-install-wheel

      # The EC2 instances run the CURRENT source, so build a portable manylinux wheel of it (not a PyPI
      # release). Matches the interpreter the instances install (cp313).
      - name: Build current-source manylinux wheel
        shell: bash
        run: |
          CIBW_OUTPUT_DIR=dist_manylinux ./scripts/build_cibuildwheel.sh --only cp313-manylinux_x86_64

      - name: Run floci cross-backend waterfall e2e
        shell: bash
        env:
          RUN_CROSS_BACKEND_E2E: '1'
          # GitHub runners can reach the Docker socket without sudo.
          SCALER_IT_CONTAINER_CLI: docker
        run: |
          python -m unittest tests.integration.test_cross_backend_waterfall_e2e -v
