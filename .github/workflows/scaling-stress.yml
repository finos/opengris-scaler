name: "Scaling Stress Test"

# Heavier end-to-end scaling test (tests/integration/test_scaling_stress_e2e.py): a client bursts a
# load of light tasks and the scheduler must scale a dynamic worker manager up to provision multiple
# real worker processes. It is NOT part of the normal build-and-test run; trigger it on demand:
#   * manually via the Actions tab ("Run workflow"), optionally overriding the knobs; or
#   * by adding the "scaling-stress" label to a pull request.
on:
  workflow_dispatch:
    inputs:
      max_workers:
        description: "Cap the dynamic manager scales toward"
        default: "8"
      tasks:
        description: "Number of tasks in the burst"
        default: "240"
      task_seconds:
        description: "Per-task sleep (seconds); keeps tasks light"
        default: "0.2"
      min_workers:
        description: "Minimum distinct workers the single-manager burst must spread across"
        default: "3"
      machines:
        description: "Number of machines / worker managers (multi-manager test)"
        default: "3"
      workers_per_machine:
        description: "Per-machine worker cap (multi-manager test)"
        default: "2"
  pull_request:
    types: [ labeled ]

permissions:
  contents: read

jobs:
  scaling-stress:
    name: Scaling Stress (Linux)
    # Manual dispatch always runs; on a PR only when it carries the "scaling-stress" label.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.label.name == 'scaling-stress' }}
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: 'Checkout Repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-env
        with:
          os: ${{ runner.os }}
          python-version: '3.10'

      - uses: ./.github/actions/3rd-party-libraries-download
        with:
          os: ${{ runner.os }}

      - uses: ./.github/actions/3rd-party-libraries-compile
        with:
          os: ${{ runner.os }}

      - uses: ./.github/actions/3rd-party-libraries-install
        with:
          os: ${{ runner.os }}

      - uses: ./.github/actions/compile-libraries
        with:
          os: ${{ runner.os }}

      - name: Build and install wheel
        shell: bash
        run: |
          uv pip install --system build
          python -m build --wheel
          wheel_file=$(ls dist/*.whl | head -n 1)
          echo "Installing wheel: $wheel_file"
          uv pip install --system "$wheel_file"

      - name: Run scaling stress test
        shell: bash
        env:
          RUN_SCALING_STRESS_TEST: '1'
          SCALING_STRESS_MAX_WORKERS: ${{ github.event.inputs.max_workers || '8' }}
          SCALING_STRESS_TASKS: ${{ github.event.inputs.tasks || '240' }}
          SCALING_STRESS_TASK_SECONDS: ${{ github.event.inputs.task_seconds || '0.2' }}
          SCALING_STRESS_MIN_WORKERS: ${{ github.event.inputs.min_workers || '3' }}
          SCALING_STRESS_MACHINES: ${{ github.event.inputs.machines || '3' }}
          SCALING_STRESS_WORKERS_PER_MACHINE: ${{ github.event.inputs.workers_per_machine || '2' }}
        run: |
          python -m unittest tests.integration.test_scaling_stress_e2e -v
