name: "LocalStack Integration Test"

# Runs tests/integration against a real LocalStack container instead of the in-process moto backend.
# Manual-only (needs Docker): trigger from the Actions tab, or add the "localstack" label to a PR.
# See tests/integration/README.md for backend coverage and the LOCALSTACK_AUTH_TOKEN (Pro) setup.
on:
  workflow_dispatch:
  pull_request:
    types: [ labeled ]

permissions:
  contents: read

jobs:
  localstack-integration:
    name: LocalStack Integration (Linux)
    # Manual dispatch always runs; on a PR only when it carries the "localstack" label.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.label.name == 'localstack' }}
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: 'Checkout Repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-env
        with:
          os: ${{ runner.os }}
          # 3.11+ so orb-py imports and the ORB/EC2 test runs (it version-skips on <3.11); community
          # LocalStack implements EC2, so that seam is the one exercised for free on this lane.
          python-version: '3.11'

      - uses: ./.github/actions/build-native-dependencies
        with:
          os: ${{ runner.os }}

      - uses: ./.github/actions/build-and-install-wheel
        with:
          extras: all,integration

      - name: Run integration tests against LocalStack
        shell: bash
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}
        run: |
          ./scripts/run_integration_localstack.sh
