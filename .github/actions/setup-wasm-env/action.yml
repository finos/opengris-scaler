name: "Setup WASM Build Environment"
description: "Install host capnp, pyodide-build and a pinned Emscripten SDK"

# These versions must stay in lockstep:
#   pyodide-build 0.34.1 -> Pyodide 0.27.7 -> Emscripten 3.1.58
# See https://pyodide.org/en/stable/development/building-and-testing-packages.html
inputs:
  emsdk-version:
    description: "Emscripten SDK version (must match the Pyodide xbuildenv)"
    required: false
    default: "3.1.58"
  pyodide-build-version:
    description: "pyodide-build version"
    required: false
    default: "0.34.1"

runs:
  using: "composite"
  steps:
    - name: Install host capnp tools
      shell: bash
      run: |
        # capnp/capnpc-c++ run on the host to generate C++ for the wasm build
        # (they can't run inside the wasm sandbox).
        sudo apt-get update
        sudo apt-get install --yes --no-install-recommends capnproto

    - name: Install pyodide-build
      shell: bash
      run: |
        # The runner's system Python is externally managed (PEP 668); install
        # pyodide-build into a dedicated venv and expose it on PATH for later
        # steps via $GITHUB_PATH.
        python3 -m venv "${RUNNER_TEMP}/pyodide-venv"
        # shellcheck disable=SC1091
        source "${RUNNER_TEMP}/pyodide-venv/bin/activate"
        python3 -m pip install --upgrade pip
        python3 -m pip install "pyodide-build==${{ inputs.pyodide-build-version }}"
        echo "${RUNNER_TEMP}/pyodide-venv/bin" >> "${GITHUB_PATH}"

    - name: Cache Emscripten SDK
      id: cache-emsdk
      uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
      with:
        path: thirdparties/emsdk
        key: emsdk-${{ runner.os }}-${{ inputs.emsdk-version }}

    - name: Install Emscripten SDK
      if: steps.cache-emsdk.outputs.cache-hit != 'true'
      shell: bash
      run: |
        mkdir -p thirdparties
        # Pinning by tag is sufficient: the emsdk repo's tags match emscripten
        # versions (e.g. tag 3.1.58 == Emscripten 3.1.58 release).
        git clone --branch "${{ inputs.emsdk-version }}" --depth 1 \
          https://github.com/emscripten-core/emsdk.git thirdparties/emsdk
        thirdparties/emsdk/emsdk install "${{ inputs.emsdk-version }}"
        thirdparties/emsdk/emsdk activate "${{ inputs.emsdk-version }}"
