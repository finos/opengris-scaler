name: 'Run Tests With Wheel Installed'
description: 'Run Unit Tests And Examples With Wheel Installed'

inputs:
  os:
    description: "operating system"
    required: true

runs:
  using: "composite"
  steps:
    - name: Install scapy for MITM tests
      shell: bash
      run: uv pip install --system scapy==2.*

    - name: Install pydivert and pywin32 for MITM tests (Windows)
      if: inputs.os == 'Windows'
      shell: bash
      run: uv pip install --system pydivert pywin32

    # TEMPORARY: C++ GTest skipped during the test_none_value investigation (not needed,
    # saves CI time). Restore the two steps below when done.
    - name: Run C++ Tests (Linux/macOS)
      if: ${{ false }}
      shell: bash
      run: sudo ./scripts/test.sh

    - name: Run C++ Tests (Windows)
      if: ${{ false }}
      shell: pwsh
      run: ./scripts/test.ps1 -C Debug

    - name: Build Wheel
      shell: bash
      run: |
        uv pip install --system build
        python -m build --wheel

    - name: Install Wheel
      shell: bash
      run: |
        wheel_file=$(ls dist/*.whl | head -n 1)
        echo "Installing wheel: $wheel_file"
        uv pip install --system "$wheel_file[all]"

    # TEMPORARY: full suite replaced with a loop of ONLY test_none_value so we can
    # iterate fast and capture the [YMQDIAG] accept/connect timeline on a genuine
    # flaky failure. Restore `python -m unittest discover -v tests -t .` when done.
    - name: Run test_none_value in a loop (instrumented)
      shell: bash
      run: |
        set -o pipefail
        ITERS=30
        PER_ITER_TIMEOUT=300
        TEST=tests.graph.test_graph.TestGraph.test_none_value
        python -c "import sys,platform,scaler;print('PYTHON',sys.version);print('PLATFORM',platform.platform());print('SCALER',scaler.__file__)"
        echo "Running $TEST x$ITERS (instrumented _ymq: [YMQDIAG] accept/connect logging active)"
        fail=0
        for i in $(seq 1 $ITERS); do
          echo "==================== test_none_value ITER $i / $ITERS START ===================="
          # -u unbuffered + faulthandler so a hang dumps stacks; 2>&1 keeps [YMQDIAG]
          # (stderr) interleaved with the [INFO]/EROR logs (stdout) in iteration order.
          if timeout ${PER_ITER_TIMEOUT} python -u -X faulthandler -m unittest -v "$TEST" 2>&1; then
            echo "==================== test_none_value ITER $i RESULT=PASS ===================="
          else
            rc=$?
            fail=$((fail+1))
            echo "==================== test_none_value ITER $i RESULT=FAIL (rc=$rc) ===================="
          fi
        done
        echo "==================== test_none_value SUMMARY: $fail / $ITERS FAILED ===================="
        # Non-zero so the job is red when it reproduces (all logs above are retained).
        test "$fail" -eq 0

    - name: Run Examples (Linux)
      if: inputs.os == 'Linux'
      shell: bash
      run: |
        readarray -t skip_examples < examples/skip_examples.txt
        for example in "./examples"/*.py; do
          filename=$(basename "$example")
          if [[ " ${skip_examples[*]} " =~ [[:space:]]${filename}[[:space:]] ]]; then
            echo "Skipping $example"
            continue
          fi
          echo "Running $example"
          python $example
        done

        uv pip install --system -r examples/ray_compat/requirements.txt
        readarray -t skip_tests < examples/ray_compat/skip_tests.txt
        for example in "./examples/ray_compat"/*.py; do
          filename=$(basename "$example")
          if [[ " ${skip_tests[*]} " =~ [[:space:]]${filename}[[:space:]] ]]; then
              echo "Skipping $example"
              continue
          fi

          echo "Running $example"
          python $example
        done

        uv pip install --system -r examples/applications/requirements_applications.txt
        for example in "./examples/applications"/*.py; do
          if python -c 'import sys; sys.exit(not sys.version_info <= (3, 10))'; then
            if [ "$example" = "./examples/applications/yfinance_historical_price.py" ]; then
              echo "Skipping $example"
              continue;
            fi
          fi

          echo "Running $example"
          python $example
        done

        if python -c 'import sys; sys.exit(not sys.version_info >= (3, 10))'; then
          uv pip install --system -r examples/libraries/requirements.txt
          for example in "./examples/libraries"/*.py; do
            echo "Running $example"
            python $example
          done
        else
          echo "Skipping examples/libraries on Python < 3.10"
        fi
