name: 'Run Tests With Wheel Installed'
description: 'Run Unit Tests And Examples With Wheel Installed'

inputs:
  os:
    description: "operating system"
    required: true

runs:
  using: "composite"
  steps:
    - name: Install scapy for MITM tests
      shell: bash
      run: uv pip install --system scapy==2.*

    - name: Install pydivert and pywin32 for MITM tests (Windows)
      if: inputs.os == 'Windows'
      shell: bash
      run: uv pip install --system pydivert pywin32

    # TEMPORARY: C++ GTest skipped during the test_none_value investigation (not needed,
    # saves CI time). Restore the two steps below when done.
    - name: Run C++ Tests (Linux/macOS)
      if: ${{ false }}
      shell: bash
      run: sudo ./scripts/test.sh

    - name: Run C++ Tests (Windows)
      if: ${{ false }}
      shell: pwsh
      run: ./scripts/test.ps1 -C Debug

    - name: Build Wheel
      shell: bash
      run: |
        uv pip install --system build
        python -m build --wheel

    - name: Install Wheel
      shell: bash
      run: |
        wheel_file=$(ls dist/*.whl | head -n 1)
        echo "Installing wheel: $wheel_file"
        uv pip install --system "$wheel_file[all]"

    # TEMPORARY: the full unittest fleet is the ONLY thing that reproduces the
    # Windows test_none_value TimeoutError. In isolation it does NOT reproduce:
    # test_none_value x30 = 0 fail (~1.5s each); whole TestGraph class x15 = 0
    # fail (~31s each, max connect attempt#2). So run the EXACT original command
    # (`python -m unittest discover -v tests -t .`) in a short loop, instrumented
    # (_ymq emits [YMQDIAG] accept/connect logging), with a background
    # [PROCWATCH] sampler logging the python.exe process count -- to test whether
    # leaked combo-teardown processes accumulate across the ~438-test fleet and
    # starve the 2-core runner right when a fresh combo's scheduler bind is
    # delayed past the connector retry window.
    # To restore: replace this whole step with master's single `Run Unittests`
    # step (`python -m unittest discover -v tests -t .`).
    - name: Run full unittest fleet in a loop (instrumented + procwatch)
      shell: bash
      run: |
        set -o pipefail
        ITERS=3
        PER_ITER_TIMEOUT=2400
        python -c "import sys,platform,scaler;print('PYTHON',sys.version);print('PLATFORM',platform.platform());print('SCALER',scaler.__file__)"
        echo "Running full fleet (unittest discover) x$ITERS (instrumented _ymq: [YMQDIAG] active)"
        # Background sampler: python process count every 20s. A rising count
        # across the fleet => leaked workers/processors from prior combos.
        ( while true; do
            n=$(tasklist 2>/dev/null | grep -ci 'python' || true)
            echo "[PROCWATCH] $(date +%H:%M:%S) python_procs=$n"
            sleep 20
          done ) &
        watch_pid=$!
        trap 'kill $watch_pid 2>/dev/null || true' EXIT
        fail=0
        for i in $(seq 1 $ITERS); do
          echo "==================== FLEET ITER $i / $ITERS START $(date +%H:%M:%S) ===================="
          # -u unbuffered + faulthandler (a hard crash -> exit 127 dumps stacks);
          # 2>&1 keeps [YMQDIAG]/[PROCWATCH] (stderr/bg) interleaved with the
          # unittest -v progress so the failing test's connect timeline is in order.
          if timeout ${PER_ITER_TIMEOUT} python -u -X faulthandler -m unittest discover -v tests -t . 2>&1; then
            echo "==================== FLEET ITER $i RESULT=PASS $(date +%H:%M:%S) ===================="
          else
            rc=$?
            fail=$((fail+1))
            echo "==================== FLEET ITER $i RESULT=FAIL (rc=$rc) $(date +%H:%M:%S) ===================="
          fi
        done
        kill $watch_pid 2>/dev/null || true
        echo "==================== FLEET SUMMARY: $fail / $ITERS FAILED ===================="
        # Non-zero so the job is red when it reproduces (all logs above are retained).
        test "$fail" -eq 0

    - name: Run Examples (Linux)
      if: inputs.os == 'Linux'
      shell: bash
      run: |
        readarray -t skip_examples < examples/skip_examples.txt
        for example in "./examples"/*.py; do
          filename=$(basename "$example")
          if [[ " ${skip_examples[*]} " =~ [[:space:]]${filename}[[:space:]] ]]; then
            echo "Skipping $example"
            continue
          fi
          echo "Running $example"
          python $example
        done

        uv pip install --system -r examples/ray_compat/requirements.txt
        readarray -t skip_tests < examples/ray_compat/skip_tests.txt
        for example in "./examples/ray_compat"/*.py; do
          filename=$(basename "$example")
          if [[ " ${skip_tests[*]} " =~ [[:space:]]${filename}[[:space:]] ]]; then
              echo "Skipping $example"
              continue
          fi

          echo "Running $example"
          python $example
        done

        uv pip install --system -r examples/applications/requirements_applications.txt
        for example in "./examples/applications"/*.py; do
          if python -c 'import sys; sys.exit(not sys.version_info <= (3, 10))'; then
            if [ "$example" = "./examples/applications/yfinance_historical_price.py" ]; then
              echo "Skipping $example"
              continue;
            fi
          fi

          echo "Running $example"
          python $example
        done

        if python -c 'import sys; sys.exit(not sys.version_info >= (3, 10))'; then
          uv pip install --system -r examples/libraries/requirements.txt
          for example in "./examples/libraries"/*.py; do
            echo "Running $example"
            python $example
          done
        else
          echo "Skipping examples/libraries on Python < 3.10"
        fi
